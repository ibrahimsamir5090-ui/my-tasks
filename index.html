<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:      #1c1c1e;
  --bg2:     #2a2a2c;
  --border:  #3a3a3c;
  --text:    #e8e8e8;
  --dim:     #888;
  --prompt:  #5ac8fa;
  --cmd:     #ffffff;
  --out:     #d4d4d4;
  --green:   #34c759;
  --yellow:  #ffd60a;
  --red:     #ff453a;
  --cyan:    #64d2ff;
  --purple:  #bf5af2;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 13.5px;
  line-height: 1.6;
}

/* ── Tab bar ─────────────────────────── */
#tabbar {
  background: #111113;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  height: 38px;
  gap: 2px;
  user-select: none;
}

.tab {
  padding: 4px 14px;
  border-radius: 6px 6px 0 0;
  font-size: 12px;
  color: var(--dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid transparent;
  border-bottom: none;
  transition: background .15s;
}

.tab.active {
  background: var(--bg2);
  color: var(--text);
  border-color: var(--border);
}

.tab .close {
  font-size: 10px;
  color: var(--dim);
  line-height: 1;
}

.tab-add {
  margin-left: 4px;
  color: var(--dim);
  cursor: pointer;
  font-size: 16px;
  padding: 0 6px;
}

.spacer { flex: 1; }

#topright {
  font-size: 11px;
  color: var(--dim);
  letter-spacing: .5px;
}

/* ── Terminal output ─────────────────── */
#terminal {
  height: calc(100vh - 38px - 44px);
  overflow-y: auto;
  padding: 12px 16px 4px;
}

#terminal::-webkit-scrollbar { width: 5px; }
#terminal::-webkit-scrollbar-track { background: transparent; }
#terminal::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

.line {
  white-space: pre-wrap;
  word-break: break-all;
  padding: 0;
  animation: appear .08s ease;
}

@keyframes appear {
  from { opacity:0; }
  to   { opacity:1; }
}

.line-cmd  { color: var(--cmd); }
.line-out  { color: var(--out); }
.line-ok   { color: var(--green); }
.line-err  { color: var(--red); }
.line-info { color: var(--cyan); }
.line-warn { color: var(--yellow); }
.line-dim  { color: var(--dim); }

.ps1-user  { color: var(--green); font-weight:600; }
.ps1-host  { color: var(--green); }
.ps1-sep   { color: var(--dim); }
.ps1-path  { color: var(--cyan); }
.ps1-dol   { color: var(--purple); }

/* ── Input row ───────────────────────── */
#inputbar {
  height: 44px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
}

#ps1 {
  white-space: nowrap;
  flex-shrink: 0;
  font-size: 13.5px;
}

#cmd {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--cmd);
  font-family: inherit;
  font-size: 13.5px;
  caret-color: var(--purple);
}

#cmd::selection { background: #5a4fff55; }
</style>
</head>
<body>

<!-- Tab bar -->
<div id="tabbar">
  <div class="tab active">
    <span>bash</span>
    <span class="close">✕</span>
  </div>
  <div class="tab-add">+</div>
  <div class="spacer"></div>
  <div id="topright" id="clock">--:--:--</div>
</div>

<!-- Output -->
<div id="terminal"></div>

<!-- Input -->
<div id="inputbar">
  <span id="ps1"></span>
  <input id="cmd" type="text" autocomplete="off" spellcheck="false">
</div>

<script>
const termEl  = document.getElementById('terminal');
const cmdEl   = document.getElementById('cmd');
const ps1El   = document.getElementById('ps1');
const clockEl = document.getElementById('topright');

// ── State ───────────────────────────────────
const STATE = {
  user: 'user',
  host: 'localhost',
  cwd:  '~',
  hist: [],
  hIdx: -1,
  start: Date.now(),
};

// ── Clock ───────────────────────────────────
(function tick() {
  const n = new Date();
  const p = v => String(v).padStart(2,'0');
  clockEl.textContent = `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  setTimeout(tick, 1000);
})();

// ── Render PS1 ──────────────────────────────
function renderPS1() {
  ps1El.innerHTML =
    `<span class="ps1-user">${esc(STATE.user)}</span>` +
    `<span class="ps1-sep">@</span>` +
    `<span class="ps1-host">${esc(STATE.host)}</span>` +
    `<span class="ps1-sep">:</span>` +
    `<span class="ps1-path">${esc(STATE.cwd)}</span>` +
    `<span class="ps1-dol"> $ </span>`;
}
renderPS1();

// ── Print ───────────────────────────────────
function print(text, cls='line-out') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text;
  termEl.appendChild(d);
  termEl.scrollTop = termEl.scrollHeight;
}

function printHTML(html, cls='line-out') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.innerHTML = html;
  termEl.appendChild(d);
  termEl.scrollTop = termEl.scrollHeight;
}

function br() { print(''); }

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Echo typed command ──────────────────────
function echoCmd(raw) {
  printHTML(
    `<span class="ps1-user">${esc(STATE.user)}</span>` +
    `<span class="ps1-sep">@</span>` +
    `<span class="ps1-host">${esc(STATE.host)}</span>` +
    `<span class="ps1-sep">:</span>` +
    `<span class="ps1-path">${esc(STATE.cwd)}</span>` +
    `<span class="ps1-dol"> $ </span>` +
    `<span class="ps1-cmd">${esc(raw)}</span>`,
    'line-cmd'
  );
}

// ── Commands ────────────────────────────────
const CMDS = {

  help(_) {
    const rows = [
      ['help',      'عرض قائمة الأوامر'],
      ['clear',     'مسح الشاشة  (أو Ctrl+L)'],
      ['echo',      'طباعة نص  →  echo hello world'],
      ['date',      'الوقت والتاريخ'],
      ['whoami',    'المستخدم الحالي'],
      ['hostname',  'اسم الجهاز'],
      ['uptime',    'مدة الجلسة'],
      ['pwd',       'المسار الحالي'],
      ['cd',        'تغيير المجلد  →  cd /sdcard'],
      ['ls',        'محتوى المجلد (محاكاة)'],
      ['env',       'متغيرات البيئة'],
      ['history',   'سجل الأوامر'],
      ['calc',      'حاسبة  →  calc 2**10 / 4'],
      ['ping',      'ping محاكاة  →  ping google.com'],
      ['neofetch',  'معلومات النظام'],
      ['exit',      'إغلاق الجلسة'],
    ];
    br();
    for (const [c, d] of rows) {
      printHTML(
        `<span style="color:var(--cyan);display:inline-block;width:100px">${esc(c)}</span>` +
        `<span style="color:var(--dim)">  ${esc(d)}</span>`
      );
    }
    br();
  },

  clear(_) { termEl.innerHTML = ''; },

  echo(args) { print(args.join(' ')); },

  date(_) {
    const n = new Date();
    print(n.toString());
  },

  whoami(_) { print(STATE.user); },

  hostname(_) { print(STATE.host); },

  pwd(_) { print(STATE.cwd === '~' ? '/data/data/com.termux/files/home' : STATE.cwd); },

  uptime(_) {
    const s = Math.floor((Date.now() - STATE.start) / 1000);
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    print(`up ${h}h ${m}m ${sec}s`);
  },

  cd(args) {
    const path = args[0] || '~';
    STATE.cwd = path;
    renderPS1();
  },

  ls(args) {
    const files = [
      { n: 'bot/',       c: 'var(--cyan)'   },
      { n: 'node_modules/', c: 'var(--cyan)' },
      { n: 'index.js',   c: 'var(--out)'    },
      { n: 'package.json', c: 'var(--out)'  },
      { n: '.env',       c: 'var(--yellow)' },
      { n: 'README.md',  c: 'var(--out)'    },
    ];
    br();
    printHTML(
      files.map(f =>
        `<span style="color:${f.c};margin-right:20px">${f.n}</span>`
      ).join(''),
      'line-out'
    );
    br();
  },

  env(_) {
    const vars = [
      ['HOME',    '/data/data/com.termux/files/home'],
      ['SHELL',   '/data/data/com.termux/files/usr/bin/bash'],
      ['TERM',    'xterm-256color'],
      ['LANG',    'en_US.UTF-8'],
      ['PATH',    '/data/data/com.termux/files/usr/bin:/usr/bin:/bin'],
      ['NODE_ENV','development'],
    ];
    br();
    for (const [k,v] of vars) {
      printHTML(
        `<span style="color:var(--green)">${k}</span>` +
        `<span style="color:var(--dim)">=</span>` +
        `<span style="color:var(--out)">${v}</span>`
      );
    }
    br();
  },

  history(_) {
    br();
    STATE.hist.forEach((h,i) => {
      printHTML(
        `<span style="color:var(--dim);display:inline-block;width:40px;text-align:right">${i+1}</span>` +
        `<span style="color:var(--out)">  ${esc(h)}</span>`
      );
    });
    br();
  },

  calc(args) {
    const expr = args.join(' ');
    if (!expr) { print('calc: missing expression', 'line-err'); return; }
    try {
      const safe = expr.replace(/[^0-9+\-*/%().\s*]/g,'');
      const res = Function('"use strict";return(' + safe + ')')();
      print(String(res));
    } catch {
      print('calc: invalid expression', 'line-err');
    }
  },

  async ping(args) {
    const host = args[0] || 'localhost';
    print(`PING ${host}: 56 data bytes`);
    for (let i = 1; i <= 4; i++) {
      await delay(350);
      const ms = (Math.random()*30+5).toFixed(3);
      print(`64 bytes from ${host}: icmp_seq=${i} ttl=64 time=${ms} ms`, 'line-ok');
    }
    print('');
    print(`--- ${host} ping statistics ---`);
    print('4 packets transmitted, 4 received, 0% packet loss');
  },

  neofetch(_) {
    br();
    const lines = [
      ['OS',      'Android (Termux)'],
      ['Shell',   'bash 5.2.15'],
      ['Node',    'v20.11.0'],
      ['npm',     '10.2.4'],
      ['Memory',  '512MB / 4GB'],
      ['Uptime',  (() => {
        const s = Math.floor((Date.now()-STATE.start)/1000);
        return `${Math.floor(s/60)}m ${s%60}s`;
      })()],
    ];
    const logo = [
      '  ████████ ',
      '  ██    ██ ',
      '  ████████ ',
      '  ██    ██ ',
      '  ████████ ',
    ];
    lines.forEach((row, i) => {
      const lpart = `<span style="color:var(--green)">${logo[i] || '           '}</span>`;
      const rpart = `<span style="color:var(--cyan)">${row[0]}</span>` +
                    `<span style="color:var(--dim)">: </span>` +
                    `<span style="color:var(--out)">${row[1]}</span>`;
      printHTML(lpart + '  ' + rpart);
    });
    br();
  },

  exit(_) {
    print('logout');
    setTimeout(() => {
      document.body.style.transition = 'opacity .4s';
      document.body.style.opacity = '0';
    }, 200);
  },
};

function delay(ms) { return new Promise(r => setTimeout(r,ms)); }

// ── Run ─────────────────────────────────────
async function run(raw) {
  const trimmed = raw.trim();
  echoCmd(trimmed);
  if (!trimmed) return;

  const parts = trimmed.split(/\s+/);
  const name  = parts[0].toLowerCase();
  const args  = parts.slice(1);

  if (CMDS[name]) {
    await CMDS[name](args);
  } else {
    print(`bash: ${name}: command not found`, 'line-err');
  }
}

// ── Input events ────────────────────────────
cmdEl.addEventListener('keydown', async e => {
  if (e.key === 'Enter') {
    const val = cmdEl.value;
    if (val.trim()) { STATE.hist.unshift(val); STATE.hIdx = -1; }
    cmdEl.value = '';
    await run(val);

  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (STATE.hIdx < STATE.hist.length - 1) {
      STATE.hIdx++;
      cmdEl.value = STATE.hist[STATE.hIdx];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (STATE.hIdx > 0) { STATE.hIdx--; cmdEl.value = STATE.hist[STATE.hIdx]; }
    else { STATE.hIdx = -1; cmdEl.value = ''; }

  } else if (e.key === 'Tab') {
    e.preventDefault();
    const p = cmdEl.value.toLowerCase();
    const m = Object.keys(CMDS).filter(c => c.startsWith(p));
    if (m.length === 1) { cmdEl.value = m[0]; }
    else if (m.length > 1) { echoCmd(cmdEl.value); print(m.join('  '), 'line-dim'); }

  } else if (e.ctrlKey && e.key === 'l') {
    e.preventDefault();
    CMDS.clear();
  } else if (e.ctrlKey && e.key === 'c') {
    e.preventDefault();
    echoCmd(cmdEl.value + '^C');
    cmdEl.value = '';
  }
});

document.addEventListener('click', () => cmdEl.focus());

// ── Welcome ─────────────────────────────────
async function welcome() {
  const motd = [
    { t:'line-dim', s:'Welcome to Termux' },
    { t:'line-dim', s:'─'.repeat(32) },
    { t:'line-out', s:'Type  help  to see available commands.' },
  ];
  for (const l of motd) {
    await delay(80);
    print(l.s, l.t);
  }
  br();
  cmdEl.focus();
}

welcome();
</script>
</body>
</html>
