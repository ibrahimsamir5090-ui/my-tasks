<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استضافة بوتات واتساب - منصة السيرفرات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e5e9f0;
            min-height: 100vh;
        }
        .navbar {
            background: #141a24;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a313c;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4fc3f7;
        }
        .logo i { margin-left: 8px; }
        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-area button {
            background: #2a313c;
            border: none;
            color: #e5e9f0;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .user-area button:hover { background: #3b4554; }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            width: 100%;
        }
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .server-card {
            background: #141a24;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #2a313c;
            transition: 0.3s;
            position: relative;
        }
        .server-card:hover {
            border-color: #4fc3f7;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .server-card .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .server-card .name {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .server-card .status {
            background: #2e7d32;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #a5d6a7;
        }
        .server-card .status.off {
            background: #4a2e2e;
            color: #ef9a9a;
        }
        .server-card .actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .server-card .actions button {
            background: #1f2833;
            border: none;
            color: #e5e9f0;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .server-card .actions button:hover { background: #2a313c; }
        .server-card .actions .primary {
            background: #0d47a1;
            color: white;
        }
        .server-card .actions .primary:hover { background: #1565c0; }
        .btn-create {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
        }
        .btn-create:hover {
            background: #1565c0;
            transform: scale(1.02);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a212b;
            border-radius: 30px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid #2a313c;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal h2 {
            margin-bottom: 1.5rem;
            color: #4fc3f7;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal label {
            display: block;
            margin: 1rem 0 0.3rem;
            font-weight: 500;
        }
        .modal input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0b0e14;
            border: 1px solid #2a313c;
            border-radius: 50px;
            color: #e5e9f0;
            font-size: 1rem;
        }
        .modal input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        .modal .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 2rem;
        }
        .modal .modal-actions button {
            padding: 0.6rem 2rem;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal .modal-actions .btn-confirm {
            background: #0d47a1;
            color: white;
        }
        .modal .modal-actions .btn-confirm:hover { background: #1565c0; }
        .modal .modal-actions .btn-cancel {
            background: #2a313c;
            color: #e5e9f0;
        }
        .modal .modal-actions .btn-cancel:hover { background: #3b4554; }
        
        /* صفحة السيرفر */
        .server-page {
            display: none;
            flex-direction: column;
            gap: 2rem;
        }
        .server-page.active { display: flex; }
        .server-page .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .server-page .header h1 { color: #4fc3f7; }
        
        .file-upload-area {
            background: #141a24;
            border: 2px dashed #2a313c;
            border-radius: 30px;
            padding: 2.5rem;
            text-align: center;
            transition: 0.3s;
        }
        .file-upload-area.dragover {
            border-color: #4fc3f7;
            background: #1a212b;
        }
        .file-upload-area input[type="file"] { display: none; }
        .file-upload-area .upload-btn {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
        }
        .file-upload-area .upload-btn:hover { background: #1565c0; }
        .file-list {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .file-list .file-item {
            background: #1f2833;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .nav-buttons button {
            background: #1f2833;
            border: none;
            color: #e5e9f0;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 150px;
        }
        .nav-buttons button:hover { background: #2a313c; }
        .nav-buttons .active-btn {
            background: #0d47a1;
            color: white;
        }
        
        .step-content {
            background: #141a24;
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid #2a313c;
            min-height: 300px;
        }
        .step-content .step-panel { display: none; }
        .step-content .step-panel.active { display: block; }
        
        /* تيرمنال بحجم تيرمكس */
        .terminal-wrapper {
            background: #0a0e14;
            border-radius: 12px;
            border: 1px solid #1e2733;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .terminal-header {
            background: #141a24;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e2733;
        }
        .terminal-header .dots {
            display: flex;
            gap: 8px;
        }
        .terminal-header .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .terminal-header .dot.red { background: #ff5f56; }
        .terminal-header .dot.yellow { background: #ffbd2e; }
        .terminal-header .dot.green { background: #27c93f; }
        .terminal-header .terminal-title {
            color: #8a94a6;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 10px;
        }
        .terminal-box {
            background: #0a0e14;
            padding: 1.2rem 1.5rem;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #e5e9f0;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-box::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-box::-webkit-scrollbar-track {
            background: #0a0e14;
        }
        .terminal-box::-webkit-scrollbar-thumb {
            background: #2a313c;
            border-radius: 4px;
        }
        .terminal-box::-webkit-scrollbar-thumb:hover {
            background: #3b4554;
        }
        .terminal-box .prompt {
            color: #4fc3f7;
        }
        .terminal-box .command {
            color: #e5e9f0;
        }
        .terminal-box .output {
            color: #a5d6a7;
        }
        .terminal-box .qr-line {
            color: #4fc3f7;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .terminal-box .error {
            color: #ef9a9a;
        }
        .terminal-box .info {
            color: #81d4fa;
        }
        .terminal-box .bot-message {
            color: #ffd54f;
            background: rgba(255, 213, 79, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border-right: 3px solid #ffd54f;
        }
        .terminal-box .bot-qr {
            color: #4fc3f7;
            font-weight: bold;
            letter-spacing: 2px;
            background: rgba(79, 195, 247, 0.1);
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            margin: 4px 0;
        }
        .terminal-input-row {
            display: flex;
            gap: 10px;
            margin-top: 0;
            padding: 0.8rem 1.2rem;
            background: #0a0e14;
            border-top: 1px solid #1e2733;
        }
        .terminal-input-row input {
            flex: 1;
            background: #0a0e14;
            border: 1px solid #1e2733;
            border-radius: 6px;
            padding: 0.6rem 1rem;
            color: #e5e9f0;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .terminal-input-row input:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.1);
        }
        .terminal-input-row input::placeholder {
            color: #4a5568;
        }
        .terminal-input-row button {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .terminal-input-row button:hover {
            background: #1565c0;
        }
        
        .options-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .options-box label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .options-box input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #4fc3f7;
        }
        .start-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            width: fit-content;
        }
        .start-btn:hover { background: #388e3c; }
        
        .step-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
            gap: 15px;
        }
        .step-actions button {
            padding: 0.6rem 2rem;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .step-actions .btn-next {
            background: #0d47a1;
            color: white;
        }
        .step-actions .btn-next:hover { background: #1565c0; }
        .step-actions .btn-prev {
            background: #2a313c;
            color: #e5e9f0;
        }
        .step-actions .btn-prev:hover { background: #3b4554; }
        
        .hidden { display: none !important; }
        .text-muted { color: #8a94a6; }
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .flex-center { display: flex; justify-content: center; }
        .gap-1 { gap: 1rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        
        @media (max-width: 600px) {
            .navbar { flex-direction: column; gap: 10px; align-items: stretch; }
            .user-area { justify-content: center; }
            .container { padding: 0 1rem; }
            .nav-buttons button { min-width: 100%; }
            .terminal-box {
                min-height: 250px;
                max-height: 350px;
                font-size: 12px;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-server"></i> BotHost</div>
        <div class="user-area">
            <span><i class="fas fa-user-circle"></i> admin</span>
            <button id="myServersBtn"><i class="fas fa-folder"></i> سيرفراتك</button>
        </div>
    </nav>

    <div class="container" id="appContainer">
        <!-- الرئيسية -->
        <div id="mainView">
            <div class="flex-between">
                <h2><i class="fas fa-cloud-upload-alt"></i> سيرفرات الاستضافة</h2>
                <button class="btn-create" id="createServerBtn"><i class="fas fa-plus-circle"></i> إنشاء سيرفر +</button>
            </div>
            <div class="servers-grid" id="serversGrid"></div>
        </div>

        <!-- صفحة السيرفر -->
        <div id="serverPage" class="server-page">
            <div class="header">
                <h1 id="serverPageTitle"><i class="fas fa-server"></i> اسم السيرفر</h1>
                <button class="btn-create" style="padding:0.5rem 1.5rem; font-size:1rem;" id="backToMainBtn"><i class="fas fa-arrow-right"></i> رجوع</button>
            </div>

            <!-- رفع الملفات -->
            <div class="file-upload-area" id="fileUploadArea">
                <i class="fas fa-cloud-upload-alt fa-3x" style="color:#4fc3f7; margin-bottom:1rem;"></i>
                <h3>ارفع ملف بوتك</h3>
                <p class="text-muted">اسحب الملف أو اختر من جهازك</p>
                <button class="upload-btn" id="uploadFileBtn"><i class="fas fa-upload"></i> رفع الملفات +</button>
                <input type="file" id="fileInput" multiple />
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- أزرار التنقل -->
            <div class="nav-buttons">
                <button class="active-btn" data-step="0">رفع الملفات</button>
                <button data-step="1">تشغيل السيرفر</button>
                <button data-step="2">تثبيت المكتبات</button>
                <button data-step="3">Terminal</button>
            </div>

            <!-- محتوى الخطوات -->
            <div class="step-content">
                <!-- الخطوة 0: رفع الملفات -->
                <div class="step-panel active" data-panel="0">
                    <div style="padding: 1rem 0;">
                        <p class="text-muted">📁 اختر ملفات البوت الخاصة بك لرفعها على السيرفر</p>
                        <div style="margin-top: 1rem; display: flex; gap: 10px; flex-wrap: wrap;">
                            <button class="btn-create" style="padding:0.5rem 1.5rem; font-size:0.9rem;" id="uploadMoreBtn"><i class="fas fa-plus"></i> إضافة ملفات</button>
                        </div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-next" id="step0Next">التالي <i class="fas fa-arrow-left"></i></button>
                    </div>
                </div>

                <!-- الخطوة 1: تشغيل السيرفر -->
                <div class="step-panel" data-panel="1">
                    <div class="options-box">
                        <h3><i class="fas fa-play-circle"></i> تشغيل السيرفر</h3>
                        <p>اضغط على زر التشغيل لبدء البوت</p>
                        <button class="start-btn" id="startServerBtn"><i class="fas fa-play"></i> تشغيل السيرفر</button>
                        <div id="startStatus" class="text-muted" style="margin-top:0.5rem;"></div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-prev" id="step1Prev"><i class="fas fa-arrow-right"></i> السابق</button>
                        <button class="btn-next" id="step1Next">التالي <i class="fas fa-arrow-left"></i></button>
                    </div>
                </div>

                <!-- الخطوة 2: تثبيت المكتبات -->
                <div class="step-panel" data-panel="2">
                    <div class="options-box">
                        <h3><i class="fas fa-cogs"></i> تثبيت المكتبات</h3>
                        <label><input type="checkbox" id="autoLibs" checked /> تثبيت مكتبات تلقائي</label>
                        <label><input type="checkbox" id="manualLibs" /> تثبيت مكتبات يدوي</label>
                        <div style="margin-top:0.5rem;">
                            <button class="btn-create" id="installLibsBtn" style="padding:0.5rem 2rem; background:#2e7d32;"><i class="fas fa-download"></i> تثبيت</button>
                        </div>
                        <div id="libsStatus" class="text-muted" style="margin-top:0.5rem;"></div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-prev" id="step2Prev"><i class="fas fa-arrow-right"></i> السابق</button>
                        <button class="btn-next" id="step2Next">التالي <i class="fas fa-arrow-left"></i></button>
                    </div>
                </div>

                <!-- الخطوة 3: Terminal -->
                <div class="step-panel" data-panel="3">
                    <div class="options-box">
                        <h3><i class="fas fa-terminal"></i> Terminal</h3>
                        <div class="terminal-wrapper">
                            <div class="terminal-header">
                                <div class="dots">
                                    <span class="dot red"></span>
                                    <span class="dot yellow"></span>
                                    <span class="dot green"></span>
                                </div>
                                <span class="terminal-title" id="terminalTitle">bash — bot@server:~/bot</span>
                            </div>
                            <div class="terminal-box" id="terminalOutput">
                                <div class="info">[Terminal] السيرفر جاهز...</div>
                            </div>
                            <div class="terminal-input-row">
                                <input type="text" id="terminalInput" placeholder="اكتب أمراً..." />
                                <button id="sendCommandBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
                            </div>
                        </div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-prev" id="step3Prev"><i class="fas fa-arrow-right"></i> السابق</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال إنشاء سيرفر -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2><i class="fas fa-plus-circle"></i> إنشاء سيرفر جديد</h2>
            <label>اسم السيرفر</label>
            <input type="text" id="serverNameInput" placeholder="مثل: بوت واتساب" />
            <label>اسم المستخدم (username)</label>
            <input type="text" id="serverUserInput" placeholder="مثل: mybot" />
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelModalBtn">إلغاء</button>
                <button class="btn-confirm" id="confirmCreateBtn"><i class="fas fa-plus"></i> +</button>
            </div>
        </div>
    </div>

    <script>
        // ============= البيانات =============
        let servers = [
            { id: 1, name: 'بوت التسويق', username: 'marketing_bot', status: 'online', files: ['bot.js', 'config.json'] },
            { id: 2, name: 'بوت الدعم', username: 'support_bot', status: 'offline', files: ['app.js'] },
        ];
        let currentServerId = null;
        let uploadedFiles = [];
        let currentStep = 0;
        let botInterval = null;
        let isBotRunning = false;

        // عناصر DOM
        const serversGrid = document.getElementById('serversGrid');
        const createModal = document.getElementById('createModal');
        const createServerBtn = document.getElementById('createServerBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const confirmCreateBtn = document.getElementById('confirmCreateBtn');
        const serverNameInput = document.getElementById('serverNameInput');
        const serverUserInput = document.getElementById('serverUserInput');
        const mainView = document.getElementById('mainView');
        const serverPage = document.getElementById('serverPage');
        const serverPageTitle = document.getElementById('serverPageTitle');
        const backToMainBtn = document.getElementById('backToMainBtn');
        const fileInput = document.getElementById('fileInput');
        const uploadFileBtn = document.getElementById('uploadFileBtn');
        const uploadMoreBtn = document.getElementById('uploadMoreBtn');
        const fileList = document.getElementById('fileList');
        const myServersBtn = document.getElementById('myServersBtn');
        const startServerBtn = document.getElementById('startServerBtn');
        const startStatus = document.getElementById('startStatus');
        const autoLibs = document.getElementById('autoLibs');
        const manualLibs = document.getElementById('manualLibs');
        const installLibsBtn = document.getElementById('installLibsBtn');
        const libsStatus = document.getElementById('libsStatus');
        const terminalOutput = document.getElementById('terminalOutput');
        const terminalInput = document.getElementById('terminalInput');
        const sendCommandBtn = document.getElementById('sendCommandBtn');
        const terminalTitle = document.getElementById('terminalTitle');

        // أزرار التنقل
        const stepButtons = document.querySelectorAll('.nav-buttons button');
        const stepPanels = document.querySelectorAll('.step-panel');
        const step0Next = document.getElementById('step0Next');
        const step1Prev = document.getElementById('step1Prev');
        const step1Next = document.getElementById('step1Next');
        const step2Prev = document.getElementById('step2Prev');
        const step2Next = document.getElementById('step2Next');
        const step3Prev = document.getElementById('step3Prev');

        // عرض السيرفرات
        function renderServers() {
            serversGrid.innerHTML = '';
            servers.forEach(server => {
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="top">
                        <span class="name"><i class="fas fa-server"></i> ${server.name}</span>
                        <span class="status ${server.status === 'online' ? '' : 'off'}">${server.status === 'online' ? '🟢 نشط' : '🔴 متوقف'}</span>
                    </div>
                    <div style="font-size:0.9rem; color:#8a94a6; margin:0.5rem 0;">@${server.username}</div>
                    <div class="actions">
                        <button class="primary" onclick="openServer(${server.id})"><i class="fas fa-ellipsis-v"></i> ثلاث نقاط</button>
                        <button onclick="toggleStatus(${server.id})"><i class="fas ${server.status === 'online' ? 'fa-pause' : 'fa-play'}"></i> ${server.status === 'online' ? 'إيقاف' : 'تشغيل'}</button>
                    </div>
                `;
                serversGrid.appendChild(card);
            });
        }

        // إضافة نص للتيرمنال
        function appendToTerminal(text, className = '') {
            const line = document.createElement('div');
            if (className) {
                line.className = className;
            }
            const timestamp = new Date().toLocaleTimeString();
            line.textContent = `[${timestamp}] ${text}`;
            terminalOutput.appendChild(line);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        // محاكاة رسائل البوت
        function startBotSimulation() {
            if (botInterval) {
                clearInterval(botInterval);
                botInterval = null;
            }
            
            isBotRunning = true;
            const botMessages = [
                '🤖 البوت جاهز للربط',
                '📱 جاري الاتصال بالواتساب...',
                '✅ تم الاتصال بنجاح',
                '📩 تم استقبال رسالة جديدة: "مرحباً"',
                '📤 تم إرسال رد: "أهلاً بك!"',
                '🔄 جاري مزامنة الرسائل...',
                '📊 تم تحديث الحالة',
                '🔔 تنبيه: مستخدم جديد انضم',
                '📨 رسالة واردة: "كيف الحال؟"',
                '📤 تم إرسال رد: "بخير، شكراً!"'
            ];
            
            let messageIndex = 0;
            
            // أول رسالة فورية
            setTimeout(() => {
                appendToTerminal('🤖 البوت يعمل الآن!', 'bot-message');
                appendToTerminal('📲 رمز QR للربط:', 'info');
                appendToTerminal('██████████████████████████████████', 'bot-qr');
                appendToTerminal('🔗 رابط الربط: https://wa.me/qr/XXXXXXXXXX', 'info');
            }, 1000);
            
            // رسائل دورية
            botInterval = setInterval(() => {
                if (messageIndex < botMessages.length) {
                    const msg = botMessages[messageIndex];
                    if (msg.includes('QR') || msg.includes('ربط')) {
                        appendToTerminal(msg, 'bot-qr');
                    } else if (msg.includes('رسالة') || msg.includes('رد')) {
                        appendToTerminal(msg, 'bot-message');
                    } else {
                        appendToTerminal(msg, 'output');
                    }
                    messageIndex++;
                } else {
                    // رسائل عشوائية بعد انتهاء القائمة
                    const randomMsgs = [
                        '📩 رسالة جديدة من واتساب: "السلام عليكم"',
                        '📤 تم إرسال رد: "وعليكم السلام ورحمة الله"',
                        '🔄 جاري تحديث قاعدة البيانات...',
                        '✅ تم تحديث 5 محادثات',
                        '🔔 إشعار: تم ربط البوت بنجاح',
                        '📊 عدد المستخدمين: 42',
                        '💾 جاري حفظ السجلات...'
                    ];
                    const randomMsg = randomMsgs[Math.floor(Math.random() * randomMsgs.length)];
                    if (randomMsg.includes('رسالة') || randomMsg.includes('رد')) {
                        appendToTerminal(randomMsg, 'bot-message');
                    } else {
                        appendToTerminal(randomMsg, 'output');
                    }
                }
            }, 5000);
        }

        // إيقاف البوت
        function stopBotSimulation() {
            if (botInterval) {
                clearInterval(botInterval);
                botInterval = null;
            }
            isBotRunning = false;
            appendToTerminal('⏹️ تم إيقاف البوت', 'error');
        }

        // فتح صفحة السيرفر
        window.openServer = function(id) {
            currentServerId = id;
            const server = servers.find(s => s.id === id);
            if (!server) return;
            
            serverPageTitle.innerHTML = `<i class="fas fa-server"></i> ${server.name} (${server.username})`;
            uploadedFiles = [...server.files];
            renderFiles();
            mainView.style.display = 'none';
            serverPage.classList.add('active');
            goToStep(0);
            
            // تنظيف التيرمنال
            terminalOutput.innerHTML = '';
            appendToTerminal(`السيرفر جاهز: ${server.name}`, 'info');
            appendToTerminal(`@${server.username}`, 'info');
            appendToTerminal('---', 'info');
            
            // تحديث عنوان التيرمنال
            terminalTitle.textContent = `bash — ${server.username}@server:~/bot`;
            
            startStatus.textContent = '';
            libsStatus.textContent = '';
            
            // إذا كان السيرفر شغال، بدء المحاكاة
            if (server.status === 'online') {
                setTimeout(() => {
                    startBotSimulation();
                }, 500);
            }
        };

        // رجوع للرئيسية
        backToMainBtn.addEventListener('click', () => {
            if (botInterval) {
                clearInterval(botInterval);
                botInterval = null;
            }
            isBotRunning = false;
            serverPage.classList.remove('active');
            mainView.style.display = 'block';
            currentServerId = null;
        });

        // عرض الملفات
        function renderFiles() {
            fileList.innerHTML = '';
            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '<span class="text-muted">لا توجد ملفات مرفوعة بعد</span>';
                return;
            }
            uploadedFiles.forEach(f => {
                const span = document.createElement('span');
                span.className = 'file-item';
                span.innerHTML = `<i class="fas fa-file"></i> ${f} <i class="fas fa-times" style="cursor:pointer; color:#ef9a9a; margin-right:8px;" onclick="removeFile('${f}')"></i>`;
                fileList.appendChild(span);
            });
        }

        // حذف ملف
        window.removeFile = function(fileName) {
            uploadedFiles = uploadedFiles.filter(f => f !== fileName);
            const server = servers.find(s => s.id === currentServerId);
            if (server) server.files = [...uploadedFiles];
            renderFiles();
        };

        // رفع ملفات
        function handleFileUpload(files) {
            for (let f of files) {
                if (!uploadedFiles.includes(f.name)) {
                    uploadedFiles.push(f.name);
                }
            }
            renderFiles();
            const server = servers.find(s => s.id === currentServerId);
            if (server) server.files = [...uploadedFiles];
            appendToTerminal(`📁 تم رفع الملف: ${files[0].name}`, 'output');
        }

        uploadFileBtn.addEventListener('click', () => fileInput.click());
        uploadMoreBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files);
            }
            fileInput.value = '';
        });

        // سحب وإفلات
        const uploadArea = document.getElementById('fileUploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileUpload(e.dataTransfer.files);
            }
        });

        // التنقل بين الخطوات
        function goToStep(step) {
            currentStep = step;
            stepButtons.forEach((btn, idx) => {
                btn.classList.remove('active-btn');
                if (idx === step) btn.classList.add('active-btn');
            });
            stepPanels.forEach((panel, idx) => {
                panel.classList.remove('active');
                if (idx === step) panel.classList.add('active');
            });
        }

        stepButtons.forEach((btn, idx) => {
            btn.addEventListener('click', () => goToStep(idx));
        });

        step0Next.addEventListener('click', () => goToStep(1));
        step1Prev.addEventListener('click', () => goToStep(0));
        step1Next.addEventListener('click', () => goToStep(2));
        step2Prev.addEventListener('click', () => goToStep(1));
        step2Next.addEventListener('click', () => goToStep(3));
        step3Prev.addEventListener('click', () => goToStep(2));

        // تشغيل السيرفر
        startServerBtn.addEventListener('click', () => {
            const server = servers.find(s => s.id === currentServerId);
            if (!server) return;
            
            if (server.status === 'online') {
                startStatus.innerHTML = '⚠️ السيرفر يعمل بالفعل';
                return;
            }
            
            startStatus.textContent = '⏳ جاري تشغيل السيرفر...';
            
            setTimeout(() => {
                server.status = 'online';
                startStatus.innerHTML = '✅ السيرفر يعمل بنجاح!';
                renderServers();
                
                // بدء محاكاة البوت
                startBotSimulation();
                
                // إظهار رسالة في التيرمنال
                appendToTerminal('🚀 تم تشغيل البوت بنجاح', 'output');
                appendToTerminal('📲 جاري تحميل رمز QR...', 'info');
                
                setTimeout(() => {
                    appendToTerminal('📲 رمز QR:', 'info');
                    appendToTerminal('██████████████████████████████████', 'bot-qr');
                    appendToTerminal('🔗 رابط الربط: https://wa.me/qr/BOT123456', 'info');
                    appendToTerminal('✅ البوت جاهز للاستخدام', 'bot-message');
                }, 1500);
                
            }, 2000);
        });

        // تثبيت المكتبات
        installLibsBtn.addEventListener('click', () => {
            if (autoLibs.checked) {
                libsStatus.textContent = '⏳ جاري التثبيت التلقائي...';
                setTimeout(() => {
                    libsStatus.textContent = '✅ تم تثبيت جميع المكتبات تلقائياً';
                    appendToTerminal('📦 تم تثبيت المكتبات تلقائياً', 'output');
                    appendToTerminal('✅ whatsapp-web.js@latest', 'output');
                    appendToTerminal('✅ qrcode@latest', 'output');
                    appendToTerminal('✅ @whiskey/repl@latest', 'output');
                }, 2000);
            } else if (manualLibs.checked) {
                libsStatus.textContent = '📦 اخترت التثبيت اليدوي. استخدم Terminal';
                appendToTerminal('🛠️ التثبيت اليدوي: استخدم npm install package-name', 'info');
                appendToTerminal('📝 مثال: npm install whatsapp-web.js', 'info');
            } else {
                libsStatus.textContent = '⚠️ يرجى اختيار طريقة التثبيت.';
            }
        });

        // إرسال أوامر Terminal
        sendCommandBtn.addEventListener('click', () => {
            const cmd = terminalInput.value.trim();
            if (!cmd) return;
            
            // عرض الأمر
            const promptLine = document.createElement('div');
            promptLine.innerHTML = `<span class="prompt">$</span> <span class="command">${cmd}</span>`;
            terminalOutput.appendChild(promptLine);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
            
            // محاكاة الرد
            setTimeout(() => {
                if (cmd.includes('npm install')) {
                    const packageName = cmd.replace('npm install', '').trim() || 'package';
                    appendToTerminal(`📦 جاري تثبيت ${packageName}...`, 'info');
                    setTimeout(() => {
                        appendToTerminal(`✅ تم تثبيت ${packageName} بنجاح`, 'output');
                    }, 1000);
                } else if (cmd.includes('help') || cmd === '?') {
                    appendToTerminal('📚 الأوامر المتاحة:', 'info');
                    appendToTerminal('  npm install <package>  - تثبيت مكتبة', 'output');
                    appendToTerminal('  start                  - تشغيل البوت', 'output');
                    appendToTerminal('  status                 - عرض حالة السيرفر', 'output');
                    appendToTerminal('  stop                   - إيقاف البوت', 'output');
                    appendToTerminal('  help                   - عرض هذه المساعدة', 'output');
                } else if (cmd === 'start') {
                    appendToTerminal('🚀 جاري تشغيل البوت...', 'info');
                    setTimeout(() => {
                        const server = servers.find(s => s.id === currentServerId);
                        if (server) {
                            server.status = 'online';
                            renderServers();
                            startBotSimulation();
                            appendToTerminal('✅ تم تشغيل البوت بنجاح', 'output');
                            appendToTerminal('شغال:', 'info');
                            appendToTerminal('██████████████████████████████████', 'bot-qr');
                        }
                    }, 1000);
                } else if (cmd === 'stop') {
                    appendToTerminal('⏹️ جاري إيقاف البوت...', 'info');
                    setTimeout(() => {
                        const server = servers.find(s => s.id === currentServerId);
                        if (server) {
                            server.status = 'offline';
                            renderServers();
                            stopBotSimulation();
                            appendToTerminal('✅ تم إيقاف البوت', 'error');
                        }
                    }, 500);
                } else if (cmd === 'status') {
                    const server = servers.find(s => s.id === currentServerId);
                    appendToTerminal(`📊 حالة السيرفر: ${server ? server.status : 'غير معروف'}`, 'info');
                    if (server && server.status === 'online') {
                        appendToTerminal('✅ البوت يعمل بشكل طبيعي', 'output');
                        appendToTerminal('📱 متصل بالواتساب', 'output');
                        appendToTerminal('👥 عدد المستخدمين: 42', 'output');
                    } else {
                        appendToTerminal('شغال  ', 'error');
                    }
                } else if (cmd === 'clear' || cmd === 'cls') {
                    terminalOutput.innerHTML = '';
                    appendToTerminal('🧹 تم مسح الشاشة', 'info');
                } else {
                    appendToTerminal(`~$:` ${cmd}`, 'output');
                }
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
            }, 300);
            
            terminalInput.value = '';
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        });

        // Enter في حقل التيرمنال
        terminalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendCommandBtn.click();
            }
        });

        // تبديل حالة السيرفر
        window.toggleStatus = function(id) {
            const server = servers.find(s => s.id === id);
            if (server) {
                server.status = server.status === 'online' ? 'offline' : 'online';
                if (server.status === 'offline' && currentServerId === id) {
                    stopBotSimulation();
                }
                if (server.status === 'online' && currentServerId === id) {
                    startBotSimulation();
                }
                renderServers();
            }
        };

        // إنشاء سيرفر جديد
        createServerBtn.addEventListener('click', () => {
            createModal.classList.add('active');
            serverNameInput.value = '';
            serverUserInput.value = '';
        });

        cancelModalBtn.addEventListener('click', () => createModal.classList.remove('active'));
        confirmCreateBtn.addEventListener('click', () => {
            const name = serverNameInput.value.trim();
            const user = serverUserInput.value.trim();
            if (!name || !user) {
                alert('يرجى إدخال اسم السيرفر واسم المستخدم');
                return;
            }
            const newServer = {
                id: Date.now(),
                name,
                username: user,
                status: 'offline',
                files: []
            };
            servers.push(newServer);
            renderServers();
            createModal.classList.remove('active');
            openServer(newServer.id);
        });

        // عرض سيرفراتي
        myServersBtn.addEventListener('click', () => {
            if (botInterval) {
                clearInterval(botInterval);
                botInterval = null;
            }
            isBotRunning = false;
            if (serverPage.classList.contains('active')) {
                serverPage.classList.remove('active');
                mainView.style.display = 'block';
            } else {
                mainView.style.display = 'block';
                serverPage.classList.remove('active');
            }
        });

        // بداية
        renderServers();
        console.log('🚀منصه سبارك');
    </script>
</body>
</html>
