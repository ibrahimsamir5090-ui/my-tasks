<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استضافة بوتات واتساب - منصة السيرفرات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #0b0e14;
            color: #e5e9f0;
            min-height: 100vh;
        }
        .navbar {
            background: #141a24;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a313c;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #4fc3f7;
        }
        .logo i { margin-left: 8px; }
        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .user-area button {
            background: #2a313c;
            border: none;
            color: #e5e9f0;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .user-area button:hover { background: #3b4554; }
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
            width: 100%;
        }
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .server-card {
            background: #141a24;
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #2a313c;
            transition: 0.3s;
            position: relative;
        }
        .server-card:hover {
            border-color: #4fc3f7;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .server-card .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .server-card .name {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .server-card .status {
            background: #2e7d32;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #a5d6a7;
        }
        .server-card .status.off {
            background: #4a2e2e;
            color: #ef9a9a;
        }
        .server-card .actions {
            margin-top: 1.5rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .server-card .actions button {
            background: #1f2833;
            border: none;
            color: #e5e9f0;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .server-card .actions button:hover { background: #2a313c; }
        .server-card .actions .primary {
            background: #0d47a1;
            color: white;
        }
        .server-card .actions .primary:hover { background: #1565c0; }
        .btn-create {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
        }
        .btn-create:hover {
            background: #1565c0;
            transform: scale(1.02);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a212b;
            border-radius: 30px;
            padding: 2.5rem;
            max-width: 500px;
            width: 90%;
            border: 1px solid #2a313c;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        }
        .modal h2 {
            margin-bottom: 1.5rem;
            color: #4fc3f7;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal label {
            display: block;
            margin: 1rem 0 0.3rem;
            font-weight: 500;
        }
        .modal input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0b0e14;
            border: 1px solid #2a313c;
            border-radius: 50px;
            color: #e5e9f0;
            font-size: 1rem;
        }
        .modal input:focus {
            outline: none;
            border-color: #4fc3f7;
        }
        .modal .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 2rem;
        }
        .modal .modal-actions button {
            padding: 0.6rem 2rem;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal .modal-actions .btn-confirm {
            background: #0d47a1;
            color: white;
        }
        .modal .modal-actions .btn-confirm:hover { background: #1565c0; }
        .modal .modal-actions .btn-cancel {
            background: #2a313c;
            color: #e5e9f0;
        }
        .modal .modal-actions .btn-cancel:hover { background: #3b4554; }

        /* صفحة السيرفر */
        .server-page {
            display: none;
            flex-direction: column;
            gap: 2rem;
        }
        .server-page.active { display: flex; }
        .server-page .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .server-page .header h1 { color: #4fc3f7; }

        .file-upload-area {
            background: #141a24;
            border: 2px dashed #2a313c;
            border-radius: 30px;
            padding: 2.5rem;
            text-align: center;
            transition: 0.3s;
        }
        .file-upload-area.dragover {
            border-color: #4fc3f7;
            background: #1a212b;
        }
        .file-upload-area input[type="file"] { display: none; }
        .file-upload-area .upload-btn {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
        }
        .file-upload-area .upload-btn:hover { background: #1565c0; }
        .file-list {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .file-list .file-item {
            background: #1f2833;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }
        .nav-buttons button {
            background: #1f2833;
            border: none;
            color: #e5e9f0;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 150px;
        }
        .nav-buttons button:hover { background: #2a313c; }
        .nav-buttons .active-btn {
            background: #0d47a1;
            color: white;
        }

        .step-content {
            background: #141a24;
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid #2a313c;
            min-height: 300px;
        }
        .step-content .step-panel { display: none; }
        .step-content .step-panel.active { display: block; }

        /* تيرمنال */
        .terminal-wrapper {
            background: #0a0e14;
            border-radius: 12px;
            border: 1px solid #1e2733;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }
        .terminal-header {
            background: #141a24;
            padding: 0.6rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e2733;
        }
        .terminal-header .dots {
            display: flex;
            gap: 8px;
        }
        .terminal-header .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
        }
        .terminal-header .dot.red { background: #ff5f56; }
        .terminal-header .dot.yellow { background: #ffbd2e; }
        .terminal-header .dot.green { background: #27c93f; }
        .terminal-header .terminal-title {
            color: #8a94a6;
            font-size: 0.85rem;
            font-weight: 500;
            margin-right: 10px;
        }
        .terminal-box {
            background: #0a0e14;
            padding: 1.2rem 1.5rem;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.8;
            color: #e5e9f0;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-box::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-box::-webkit-scrollbar-track {
            background: #0a0e14;
        }
        .terminal-box::-webkit-scrollbar-thumb {
            background: #2a313c;
            border-radius: 4px;
        }
        .terminal-box::-webkit-scrollbar-thumb:hover {
            background: #3b4554;
        }
        .terminal-box .prompt {
            color: #4fc3f7;
        }
        .terminal-box .command {
            color: #e5e9f0;
        }
        .terminal-box .bot-message {
            color: #ffd54f;
            background: rgba(255, 213, 79, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border-right: 3px solid #ffd54f;
            margin: 2px 0;
        }
        .terminal-box .bot-error {
            color: #ef9a9a;
            background: rgba(239, 154, 154, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border-right: 3px solid #ef9a9a;
            margin: 2px 0;
        }
        .terminal-box .bot-info {
            color: #81d4fa;
            background: rgba(129, 212, 250, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border-right: 3px solid #81d4fa;
            margin: 2px 0;
        }
        .terminal-box .bot-success {
            color: #a5d6a7;
            background: rgba(165, 214, 167, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            border-right: 3px solid #a5d6a7;
            margin: 2px 0;
        }
        .terminal-box .bot-code {
            color: #ce93d8;
            background: rgba(206, 147, 216, 0.1);
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
            margin: 4px 0;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px dashed #ce93d8;
        }
        .terminal-input-row {
            display: flex;
            gap: 10px;
            margin-top: 0;
            padding: 0.8rem 1.2rem;
            background: #0a0e14;
            border-top: 1px solid #1e2733;
        }
        .terminal-input-row input {
            flex: 1;
            background: #0a0e14;
            border: 1px solid #1e2733;
            border-radius: 6px;
            padding: 0.6rem 1rem;
            color: #e5e9f0;
            font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }
        .terminal-input-row input:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.1);
        }
        .terminal-input-row input::placeholder {
            color: #4a5568;
        }
        .terminal-input-row button {
            background: #0d47a1;
            color: white;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .terminal-input-row button:hover {
            background: #1565c0;
        }

        .options-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .options-box label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }
        .options-box input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #4fc3f7;
        }
        .start-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            width: fit-content;
        }
        .start-btn:hover { background: #388e3c; }
        .stop-btn {
            background: #c62828;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            width: fit-content;
        }
        .stop-btn:hover { background: #d32f2f; }

        .step-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
            gap: 15px;
        }
        .step-actions button {
            padding: 0.6rem 2rem;
            border-radius: 60px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .step-actions .btn-next {
            background: #0d47a1;
            color: white;
        }
        .step-actions .btn-next:hover { background: #1565c0; }
        .step-actions .btn-prev {
            background: #2a313c;
            color: #e5e9f0;
        }
        .step-actions .btn-prev:hover { background: #3b4554; }

        .hidden { display: none !important; }
        .text-muted { color: #8a94a6; }
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .flex-center { display: flex;
            justify-content: center; }
        .gap-1 { gap: 1rem; }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            .user-area { justify-content: center; }
            .container { padding: 0 1rem; }
            .nav-buttons button { min-width: 100%; }
            .terminal-box {
                min-height: 250px;
                max-height: 350px;
                font-size: 12px;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-server"></i> BotHost</div>
        <div class="user-area">
            <span><i class="fas fa-user-circle"></i> admin</span>
            <button id="myServersBtn"><i class="fas fa-folder"></i> سيرفراتك</button>
        </div>
    </nav>

    <div class="container" id="appContainer">
        <!-- الرئيسية -->
        <div id="mainView">
            <div class="flex-between">
                <h2><i class="fas fa-cloud-upload-alt"></i> سيرفرات الاستضافة</h2>
                <button class="btn-create" id="createServerBtn"><i class="fas fa-plus-circle"></i> إنشاء سيرفر +</button>
            </div>
            <div class="servers-grid" id="serversGrid"></div>
        </div>

        <!-- صفحة السيرفر -->
        <div id="serverPage" class="server-page">
            <div class="header">
                <h1 id="serverPageTitle"><i class="fas fa-server"></i> اسم السيرفر</h1>
                <button class="btn-create" style="padding:0.5rem 1.5rem; font-size:1rem;" id="backToMainBtn"><i class="fas fa-arrow-right"></i> رجوع</button>
            </div>

            <!-- رفع الملفات -->
            <div class="file-upload-area" id="fileUploadArea">
                <i class="fas fa-cloud-upload-alt fa-3x" style="color:#4fc3f7; margin-bottom:1rem;"></i>
                <h3>ارفع ملف بوتك</h3>
                <p class="text-muted">اسحب الملف أو اختر من جهازك</p>
                <button class="upload-btn" id="uploadFileBtn"><i class="fas fa-upload"></i> رفع الملفات +</button>
                <input type="file" id="fileInput" multiple />
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- أزرار التنقل -->
            <div class="nav-buttons">
                <button class="active-btn" data-step="0">رفع الملفات</button>
                <button data-step="1">تشغيل السيرفر</button>
                <button data-step="2">تثبيت المكتبات</button>
                <button data-step="3">Terminal</button>
            </div>

            <!-- محتوى الخطوات -->
            <div class="step-content">
                <!-- الخطوة 0: رفع الملفات -->
                <div class="step-panel active" data-panel="0">
                    <div style="padding: 1rem 0;">
                        <p class="text-muted">📁 اختر ملفات البوت الخاصة بك لرفعها على السيرفر</p>
                        <div style="margin-top: 1rem; display: flex; gap: 10px; flex-wrap: wrap;">
                            <button class="btn-create" style="padding:0.5rem 1.5rem; font-size:0.9rem;" id="uploadMoreBtn"><i class="fas fa-plus"></i> إضافة ملفات</button>
                        </div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-next" id="step0Next">التالي <i class="fas fa-arrow-left"></i></button>
                    </div>
                </div>

                <!-- الخطوة 1: تشغيل السيرفر -->
                <div class="step-panel" data-panel="1">
                    <div class="options-box">
                        <h3><i class="fas fa-play-circle"></i> تشغيل السيرفر</h3>
                        <p>اضغط على زر التشغيل لبدء البوت</p>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                            <button class="start-btn" id="startServerBtn"><i class="fas fa-play"></i> تشغيل السيرفر</button>
                            <button class="stop-btn" id="stopServerBtn"><i class="fas fa-stop"></i> إيقاف السيرفر</button>
                        </div>
                        <div id="startStatus" class="text-muted" style="margin-top:0.5rem;"></div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-prev" id="step1Prev"><i class="fas fa-arrow-right"></i> السابق</button>
                        <button class="btn-next" id="step1Next">التالي <i class="fas fa-arrow-left"></i></button>
                    </div>
                </div>

                <!-- الخطوة 2: تثبيت المكتبات -->
                <div class="step-panel" data-panel="2">
                    <div class="options-box">
                        <h3><i class="fas fa-cogs"></i> تثبيت المكتبات</h3>
                        <label><input type="checkbox" id="autoLibs" checked /> تثبيت مكتبات تلقائي</label>
                        <label><input type="checkbox" id="manualLibs" /> تثبيت مكتبات يدوي</label>
                        <div style="margin-top:0.5rem;">
                            <button class="btn-create" id="installLibsBtn" style="padding:0.5rem 2rem; background:#2e7d32;"><i class="fas fa-download"></i> تثبيت</button>
                        </div>
                        <div id="libsStatus" class="text-muted" style="margin-top:0.5rem;"></div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-prev" id="step2Prev"><i class="fas fa-arrow-right"></i> السابق</button>
                        <button class="btn-next" id="step2Next">التالي <i class="fas fa-arrow-left"></i></button>
                    </div>
                </div>

                <!-- الخطوة 3: Terminal -->
                <div class="step-panel" data-panel="3">
                    <div class="options-box">
                        <h3><i class="fas fa-terminal"></i> Terminal</h3>
                        <div class="terminal-wrapper">
                            <div class="terminal-header">
                                <div class="dots">
                                    <span class="dot red"></span>
                                    <span class="dot yellow"></span>
                                    <span class="dot green"></span>
                                </div>
                                <span class="terminal-title" id="terminalTitle">bash — bot@server:~/bot</span>
                            </div>
                            <div class="terminal-box" id="terminalOutput">
                                <div class="bot-info">[Terminal] السيرفر جاهز...</div>
                            </div>
                            <div class="terminal-input-row">
                                <input type="text" id="terminalInput" placeholder="اكتب أمراً..." />
                                <button id="sendCommandBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
                            </div>
                        </div>
                    </div>
                    <div class="step-actions">
                        <button class="btn-prev" id="step3Prev"><i class="fas fa-arrow-right"></i> السابق</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- مودال إنشاء سيرفر -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2><i class="fas fa-plus-circle"></i> إنشاء سيرفر جديد</h2>
            <label>اسم السيرفر</label>
            <input type="text" id="serverNameInput" placeholder="مثل: بوت واتساب" />
            <label>اسم المستخدم (username)</label>
            <input type="text" id="serverUserInput" placeholder="مثل: mybot" />
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelModalBtn">إلغاء</button>
                <button class="btn-confirm" id="confirmCreateBtn"><i class="fas fa-plus"></i> +</button>
            </div>
        </div>
    </div>

    <script>
        // ============= البيانات =============
        let servers = [];
        let currentServerId = null;
        let uploadedFiles = [];
        let currentStep = 0;

        // ============= Socket.io =============
        const socket = io('http://localhost:3000');
        let currentBotId = null;

        socket.on('connect', () => {
            console.log('✅ متصل بالخادم');
            appendToTerminal('🟢 تم الاتصال بالخادم', 'bot-success');
            loadBots();
        });

        socket.on('bot-log', (log) => {
            const className = log.type === 'qr' ? 'bot-code' :
                log.type === 'success' ? 'bot-success' :
                log.type === 'error' ? 'bot-error' :
                log.type === 'message' ? 'bot-message' :
                'bot-info';
            appendToTerminal(`[${log.timestamp}] ${log.message}`, className);
        });

        socket.on('bot-qr', (qr) => {
            appendToTerminal('📲 رمز QR:', 'bot-info');
            appendToTerminal(qr, 'bot-code');
        });

        socket.on('bot-ready', (data) => {
            appendToTerminal(`✅ البوت جاهز! رقم: ${data.wid}`, 'bot-success');
            appendToTerminal(`👤 الاسم: ${data.name}`, 'bot-info');
            const server = servers.find(s => s.id === currentServerId);
            if (server) {
                server.status = 'online';
                renderServers();
                document.getElementById('startStatus').innerHTML = '✅ السيرفر يعمل بنجاح!';
            }
        });

        // ============= عناصر DOM =============
        const serversGrid = document.getElementById('serversGrid');
        const createModal = document.getElementById('createModal');
        const createServerBtn = document.getElementById('createServerBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');
        const confirmCreateBtn = document.getElementById('confirmCreateBtn');
        const serverNameInput = document.getElementById('serverNameInput');
        const serverUserInput = document.getElementById('serverUserInput');
        const mainView = document.getElementById('mainView');
        const serverPage = document.getElementById('serverPage');
        const serverPageTitle = document.getElementById('serverPageTitle');
        const backToMainBtn = document.getElementById('backToMainBtn');
        const fileInput = document.getElementById('fileInput');
        const uploadFileBtn = document.getElementById('uploadFileBtn');
        const uploadMoreBtn = document.getElementById('uploadMoreBtn');
        const fileList = document.getElementById('fileList');
        const myServersBtn = document.getElementById('myServersBtn');
        const startServerBtn = document.getElementById('startServerBtn');
        const stopServerBtn = document.getElementById('stopServerBtn');
        const startStatus = document.getElementById('startStatus');
        const autoLibs = document.getElementById('autoLibs');
        const manualLibs = document.getElementById('manualLibs');
        const installLibsBtn = document.getElementById('installLibsBtn');
        const libsStatus = document.getElementById('libsStatus');
        const terminalOutput = document.getElementById('terminalOutput');
        const terminalInput = document.getElementById('terminalInput');
        const sendCommandBtn = document.getElementById('sendCommandBtn');
        const terminalTitle = document.getElementById('terminalTitle');

        // أزرار التنقل
        const stepButtons = document.querySelectorAll('.nav-buttons button');
        const stepPanels = document.querySelectorAll('.step-panel');
        const step0Next = document.getElementById('step0Next');
        const step1Prev = document.getElementById('step1Prev');
        const step1Next = document.getElementById('step1Next');
        const step2Prev = document.getElementById('step2Prev');
        const step2Next = document.getElementById('step2Next');
        const step3Prev = document.getElementById('step3Prev');

        // ============= الدوال الأساسية =============

        // عرض السيرفرات
        function renderServers() {
            serversGrid.innerHTML = '';
            if (servers.length === 0) {
                serversGrid.innerHTML = '<div class="text-muted" style="text-align:center;padding:3rem;">لا توجد سيرفرات، قم بإنشاء سيرفر جديد</div>';
                return;
            }
            servers.forEach(server => {
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                        <div class="top">
                            <span class="name"><i class="fas fa-server"></i> ${server.name}</span>
                            <span class="status ${server.status === 'online' ? '' : 'off'}">${server.status === 'online' ? '🟢 نشط' : '🔴 متوقف'}</span>
                        </div>
                        <div style="font-size:0.9rem; color:#8a94a6; margin:0.5rem 0;">@${server.username}</div>
                        <div class="actions">
                            <button class="primary" onclick="openServer('${server.id}')"><i class="fas fa-ellipsis-v"></i> ثلاث نقاط</button>
                            <button onclick="toggleStatus('${server.id}')"><i class="fas ${server.status === 'online' ? 'fa-pause' : 'fa-play'}"></i> ${server.status === 'online' ? 'إيقاف' : 'تشغيل'}</button>
                        </div>
                    `;
                serversGrid.appendChild(card);
            });
        }

        // إضافة نص للتيرمنال
        function appendToTerminal(text, className = '') {
            const line = document.createElement('div');
            if (className) {
                line.className = className;
            }
            if (!text.includes('[')) {
                const timestamp = new Date().toLocaleTimeString();
                line.textContent = `[${timestamp}] ${text}`;
            } else {
                line.textContent = text;
            }
            terminalOutput.appendChild(line);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        // فتح صفحة السيرفر
        window.openServer = function(id) {
            currentServerId = id;
            const server = servers.find(s => s.id === id);
            if (!server) return;

            currentBotId = server.username;
            serverPageTitle.innerHTML = `<i class="fas fa-server"></i> ${server.name} (${server.username})`;
            uploadedFiles = [...server.files];
            renderFiles();
            mainView.style.display = 'none';
            serverPage.classList.add('active');
            goToStep(0);

            terminalOutput.innerHTML = '';
            appendToTerminal(`السيرفر جاهز: ${server.name}`, 'bot-info');
            appendToTerminal(`@${server.username}`, 'bot-info');
            appendToTerminal('---', 'bot-info');

            terminalTitle.textContent = `bash — ${server.username}@server:~/bot`;
            startStatus.textContent = server.status === 'online' ? '✅ السيرفر يعمل' : '⏹️ السيرفر متوقف';

            socket.emit('register-bot', server.username);
        };

        // رجوع للرئيسية
        backToMainBtn.addEventListener('click', () => {
            serverPage.classList.remove('active');
            mainView.style.display = 'block';
            currentServerId = null;
            currentBotId = null;
        });

        // عرض الملفات
        function renderFiles() {
            fileList.innerHTML = '';
            if (uploadedFiles.length === 0) {
                fileList.innerHTML = '<span class="text-muted">لا توجد ملفات مرفوعة بعد</span>';
                return;
            }
            uploadedFiles.forEach(f => {
                const span = document.createElement('span');
                span.className = 'file-item';
                span.innerHTML =
                    `<i class="fas fa-file"></i> ${f} <i class="fas fa-times" style="cursor:pointer; color:#ef9a9a; margin-right:8px;" onclick="removeFile('${f}')"></i>`;
                fileList.appendChild(span);
            });
        }

        // حذف ملف
        window.removeFile = function(fileName) {
            uploadedFiles = uploadedFiles.filter(f => f !== fileName);
            const server = servers.find(s => s.id === currentServerId);
            if (server) server.files = [...uploadedFiles];
            renderFiles();
        };

        // رفع ملفات
        function handleFileUpload(files) {
            const server = servers.find(s => s.id === currentServerId);
            if (!server) return;

            const formData = new FormData();
            for (let f of files) {
                formData.append('files', f);
                if (!uploadedFiles.includes(f.name)) {
                    uploadedFiles.push(f.name);
                }
            }
            formData.append('botId', server.username);

            fetch('http://localhost:3000/api/bot/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        appendToTerminal(`✅ تم رفع ${data.files.length} ملف`, 'bot-success');
                        server.files = [...uploadedFiles];
                        renderFiles();
                    }
                })
                .catch(err => {
                    appendToTerminal(`❌ خطأ في الرفع: ${err.message}`, 'bot-error');
                });
        }

        uploadFileBtn.addEventListener('click', () => fileInput.click());
        uploadMoreBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileUpload(e.target.files);
            }
            fileInput.value = '';
        });

        // سحب وإفلات
        const uploadArea = document.getElementById('fileUploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileUpload(e.dataTransfer.files);
            }
        });

        // التنقل بين الخطوات
        function goToStep(step) {
            currentStep = step;
            stepButtons.forEach((btn, idx) => {
                btn.classList.remove('active-btn');
                if (idx === step) btn.classList.add('active-btn');
            });
            stepPanels.forEach((panel, idx) => {
                panel.classList.remove('active');
                if (idx === step) panel.classList.add('active');
            });
        }

        stepButtons.forEach((btn, idx) => {
            btn.addEventListener('click', () => goToStep(idx));
        });

        step0Next.addEventListener('click', () => goToStep(1));
        step1Prev.addEventListener('click', () => goToStep(0));
        step1Next.addEventListener('click', () => goToStep(2));
        step2Prev.addEventListener('click', () => goToStep(1));
        step2Next.addEventListener('click', () => goToStep(3));
        step3Prev.addEventListener('click', () => goToStep(2));

        // ============= تشغيل وإيقاف السيرفر =============

        // تشغيل السيرفر
        startServerBtn.addEventListener('click', async () => {
            const server = servers.find(s => s.id === currentServerId);
            if (!server) return;

            if (server.status === 'online') {
                startStatus.innerHTML = '⚠️ السيرفر يعمل بالفعل';
                return;
            }

            startStatus.textContent = '⏳ جاري تشغيل السيرفر...';

            try {
                const response = await fetch('http://localhost:3000/api/bot/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        botId: server.username,
                        socketId: socket.id
                    })
                });

                const data = await response.json();
                if (data.success) {
                    startStatus.innerHTML = '✅ جاري تشغيل البوت... انتظر التوصيل';
                    socket.emit('register-bot', server.username);
                } else {
                    startStatus.innerHTML = `❌ ${data.error}`;
                }
            } catch (error) {
                startStatus.innerHTML = `❌ خطأ: ${error.message}`;
            }
        });

        // إيقاف السيرفر
        stopServerBtn.addEventListener('click', async () => {
            const server = servers.find(s => s.id === currentServerId);
            if (!server) return;

            try {
                const response = await fetch('http://localhost:3000/api/bot/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ botId: server.username })
                });

                const data = await response.json();
                if (data.success) {
                    startStatus.innerHTML = '⏹️ تم إيقاف السيرفر';
                    server.status = 'offline';
                    renderServers();
                    appendToTerminal('⏹️ تم إيقاف البوت', 'bot-error');
                }
            } catch (error) {
                startStatus.innerHTML = `❌ خطأ: ${error.message}`;
            }
        });

        // تثبيت المكتبات
        installLibsBtn.addEventListener('click', () => {
            if (autoLibs.checked) {
                libsStatus.textContent = '⏳ جاري التثبيت التلقائي...';
                setTimeout(() => {
                    libsStatus.textContent = '✅ تم تثبيت جميع المكتبات تلقائياً';
                    appendToTerminal('📦 تم تثبيت المكتبات تلقائياً', 'bot-success');
                    appendToTerminal('✅ whatsapp-web.js@latest', 'bot-success');
                    appendToTerminal('✅ qrcode@latest', 'bot-success');
                }, 2000);
            } else if (manualLibs.checked) {
                libsStatus.textContent = '📦 اخترت التثبيت اليدوي. استخدم Terminal';
                appendToTerminal('🛠️ التثبيت اليدوي: استخدم npm install package-name', 'bot-info');
            } else {
                libsStatus.textContent = '⚠️ يرجى اختيار طريقة التثبيت.';
            }
        });

        // ============= أوامر Terminal =============
        sendCommandBtn.addEventListener('click', () => {
            const cmd = terminalInput.value.trim();
            if (!cmd) return;

            const promptLine = document.createElement('div');
            promptLine.innerHTML = `<span class="prompt">$</span> <span class="command">${cmd}</span>`;
            terminalOutput.appendChild(promptLine);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;

            setTimeout(() => {
                if (cmd.includes('npm install')) {
                    const packageName = cmd.replace('npm install', '').trim() || 'package';
                    appendToTerminal(`📦 جاري تثبيت ${packageName}...`, 'bot-info');
                    setTimeout(() => {
                        appendToTerminal(`✅ تم تثبيت ${packageName} بنجاح`, 'bot-success');
                    }, 1000);
                } else if (cmd === 'start' || cmd === 'run') {
                    startServerBtn.click();
                } else if (cmd === 'stop') {
                    stopServerBtn.click();
                } else if (cmd === 'status') {
                    const server = servers.find(s => s.id === currentServerId);
                    appendToTerminal(`📊 حالة السيرفر: ${server ? server.status : 'غير معروف'}`, 'bot-info');
                } else if (cmd === 'clear' || cmd === 'cls') {
                    terminalOutput.innerHTML = '';
                    appendToTerminal('🧹 تم مسح الشاشة', 'bot-info');
                } else if (cmd === 'help') {
                    appendToTerminal('📚 الأوامر المتاحة:', 'bot-info');
                    appendToTerminal('  start    - تشغيل البوت', 'bot-info');
                    appendToTerminal('  stop     - إيقاف البوت', 'bot-info');
                    appendToTerminal('  status   - عرض حالة السيرفر', 'bot-info');
                    appendToTerminal('  clear    - مسح الشاشة', 'bot-info');
                    appendToTerminal('  help     - عرض هذه المساعدة', 'bot-info');
                } else {
                    appendToTerminal(`✅ تم تنفيذ الأمر: ${cmd}`, 'bot-success');
                }
                terminalOutput.scrollTop = terminalOutput.scrollHeight;
            }, 300);

            terminalInput.value = '';
        });

        terminalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendCommandBtn.click();
            }
        });

        // ============= تبديل حالة السيرفر =============
        window.toggleStatus = function(id) {
            const server = servers.find(s => s.id === id);
            if (server) {
                if (server.status === 'online') {
                    fetch('http://localhost:3000/api/bot/stop', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ botId: server.username })
                        })
                        .then(() => {
                            server.status = 'offline';
                            renderServers();
                        });
                } else {
                    fetch('http://localhost:3000/api/bot/start', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                botId: server.username,
                                socketId: socket.id
                            })
                        })
                        .then(() => {
                            server.status = 'online';
                            renderServers();
                            socket.emit('register-bot', server.username);
                        });
                }
            }
        };

        // ============= إنشاء سيرفر جديد =============
        createServerBtn.addEventListener('click', () => {
            createModal.classList.add('active');
            serverNameInput.value = '';
            serverUserInput.value = '';
        });

        cancelModalBtn.addEventListener('click', () => createModal.classList.remove('active'));

        confirmCreateBtn.addEventListener('click', async () => {
            const name = serverNameInput.value.trim();
            const user = serverUserInput.value.trim();
            if (!name || !user) {
                alert('يرجى إدخال اسم السيرفر واسم المستخدم');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/bot/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        botId: user,
                        name: name,
                        username: user
                    })
                });

                const data = await response.json();
                if (data.success) {
                    const newServer = {
                        id: Date.now().toString(),
                        name: data.name,
                        username: data.username,
                        status: 'offline',
                        files: []
                    };
                    servers.push(newServer);
                    renderServers();
                    createModal.classList.remove('active');
                    openServer(newServer.id);
                    appendToTerminal(`✅ تم إنشاء السيرفر: ${name}`, 'bot-success');
                } else {
                    alert('خطأ في إنشاء السيرفر');
                }
            } catch (error) {
                alert(`خطأ: ${error.message}`);
            }
        });

        // ============= تحميل البوتات =============
        async function loadBots() {
            try {
                const response = await fetch('http://localhost:3000/api/bots');
                const bots = await response.json();
                bots.forEach(bot => {
                    const exists = servers.find(s => s.username === bot.id);
                    if (!exists) {
                        servers.push({
                            id: Date.now().toString() + Math.random().toString(36),
                            name: bot.name || bot.id,
                            username: bot.id,
                            status: bot.status || 'offline',
                            files: bot.files || []
                        });
                    }
                });
                renderServers();
            } catch (error) {
                console.log('⚠️ لا يمكن تحميل البوتات من الخادم');
                if (servers.length === 0) {
                    servers = [
                        { id: '1', name: 'بوت التسويق', username: 'marketing_bot', status: 'offline', files: ['bot.js'] },
                        { id: '2', name: 'بوت الدعم', username: 'support_bot', status: 'offline', files: ['app.js'] }
                    ];
                    renderServers();
                }
            }
        }

        // ============= عرض سيرفراتي =============
        myServersBtn.addEventListener('click', () => {
            if (serverPage.classList.contains('active')) {
                serverPage.classList.remove('active');
                mainView.style.display = 'block';
            } else {
                mainView.style.display = 'block';
                serverPage.classList.remove('active');
            }
        });

        // ============= بداية التشغيل =============
        setTimeout(loadBots, 1000);
        console.log('🚀 منصة استضافة بوتات واتساب جاهزة!');
        console.log('⚠️ تأكد من تشغيل الخادم الخلفي على http://localhost:3000');
    </script>

    <!-- ============================================================ -->
    <!-- ============== SERVER.JS (Backend) ============== -->
    <!-- ============================================================ -->
    <script>
        // هذا الكود يعمل كخادم خلفي (Backend) باستخدام Node.js
        // لتنفيذه: احفظ هذا الملف كـ server.js وشغله بـ node server.js

        const express = require('express');
        const http = require('http');
        const socketIo = require('socket.io');
        const cors = require('cors');
        const multer = require('multer');
        const fs = require('fs-extra');
        const path = require('path');
        const { Client, LocalAuth } = require('whatsapp-web.js');

        const app = express();
        const server = http.createServer(app);
        const io = socketIo(server, {
            cors: { origin: "*", methods: ["GET", "POST"] }
        });

        const BOTS_DIR = path.join(__dirname, 'bots');
        fs.ensureDirSync(BOTS_DIR);

        app.use(cors());
        app.use(express.json());
        app.use(express.static(__dirname));

        const storage = multer.diskStorage({
            destination: (req, file, cb) => {
                const botId = req.body.botId || 'temp';
                const botDir = path.join(BOTS_DIR, botId);
                fs.ensureDirSync(botDir);
                cb(null, botDir);
            },
            filename: (req, file, cb) => cb(null, file.originalname)
        });
        const upload = multer({ storage });

        const activeBots = new Map();

        class BotManager {
            constructor(botId, socketId) {
                this.botId = botId;
                this.socketId = socketId;
                this.client = null;
                this.isRunning = false;
                this.botDir = path.join(BOTS_DIR, botId);
                this.sessionDir = path.join(this.botDir, 'session');
                this.logs = [];
            }

            addLog(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                this.logs.push({ timestamp, message, type });
                io.to(this.socketId).emit('bot-log', { timestamp, message, type });
                console.log(`[${this.botId}] ${message}`);
            }

            async start() {
                if (this.isRunning) {
                    this.addLog('⚠️ البوت يعمل بالفعل', 'error');
                    return;
                }

                this.addLog('🚀 جاري تشغيل البوت...', 'info');
                this.addLog('📱 جاري تهيئة عميل واتساب...', 'info');

                try {
                    this.client = new Client({
                        authStrategy: new LocalAuth({ dataPath: this.sessionDir }),
                        puppeteer: { headless: true, args: ['--no-sandbox', '--disable-setuid-sandbox'] }
                    });

                    this.client.on('qr', (qr) => {
                        this.addLog('📲 رمز QR:', 'qr');
                        this.addLog(qr, 'qr');
                        io.to(this.socketId).emit('bot-qr', qr);
                    });

                    this.client.on('authenticated', () => {
                        this.addLog('✅ تم التوثيق بنجاح!', 'success');
                    });

                    this.client.on('auth_failure', (msg) => {
                        this.addLog(`❌ فشل التوثيق: ${msg}`, 'error');
                    });

                    this.client.on('ready', () => {
                        this.isRunning = true;
                        this.addLog('✅ البوت جاهز ويعمل!', 'success');
                        this.addLog(`👤 رقم البوت: ${this.client.info.wid.user}`, 'info');
                        io.to(this.socketId).emit('bot-ready', {
                            wid: this.client.info.wid.user,
                            name: this.client.info.pushname
                        });
                    });

                    this.client.on('message', async (message) => {
                        this.addLog(`📩 رسالة واردة من ${message.from}: ${message.body}`, 'message');
                        if (message.body.toLowerCase() === 'ping') {
                            await message.reply('pong 🏓');
                            this.addLog(`📤 تم إرسال رد: pong 🏓`, 'message');
                        }
                    });

                    this.client.on('disconnected', (reason) => {
                        this.isRunning = false;
                        this.addLog(`🔴 تم قطع الاتصال: ${reason}`, 'error');
                    });

                    await this.client.initialize();
                    this.addLog('✅ تم تشغيل البوت بنجاح!', 'success');

                } catch (error) {
                    this.addLog(`❌ خطأ: ${error.message}`, 'error');
                }
            }

            async stop() {
                if (!this.isRunning) {
                    this.addLog('⚠️ البوت متوقف', 'error');
                    return;
                }
                this.addLog('⏹️ جاري إيقاف البوت...', 'info');
                try {
                    if (this.client) {
                        await this.client.destroy();
                        this.client = null;
                    }
                    this.isRunning = false;
                    this.addLog('✅ تم إيقاف البوت', 'success');
                } catch (error) {
                    this.addLog(`❌ خطأ: ${error.message}`, 'error');
                }
            }

            getStatus() {
                return { botId: this.botId, isRunning: this.isRunning, logs: this.logs.slice(-100) };
            }
        }

        // API Routes
        app.post('/api/bot/create', (req, res) => {
            const { botId, name, username } = req.body;
            if (!botId || !name) return res.status(400).json({ error: 'بيانات ناقصة' });
            const botDir = path.join(BOTS_DIR, botId);
            fs.ensureDirSync(botDir);
            fs.ensureDirSync(path.join(botDir, 'session'));
            res.json({ success: true, botId, name, username });
        });

        app.post('/api/bot/upload', upload.array('files'), (req, res) => {
            const { botId } = req.body;
            if (!botId) return res.status(400).json({ error: 'botId مطلوب' });
            const files = req.files.map(f => f.originalname);
            res.json({ success: true, botId, files });
        });

        app.post('/api/bot/start', (req, res) => {
            const { botId, socketId } = req.body;
            if (!botId || !socketId) return res.status(400).json({ error: 'بيانات ناقصة' });
            const botDir = path.join(BOTS_DIR, botId);
            if (!fs.existsSync(botDir)) return res.status(404).json({ error: 'البوت غير موجود' });

            const botManager = new BotManager(botId, socketId);
            activeBots.set(botId, botManager);
            botManager.start();
            res.json({ success: true, botId, message: 'جاري تشغيل البوت...' });
        });

        app.post('/api/bot/stop', (req, res) => {
            const { botId } = req.body;
            if (!botId) return res.status(400).json({ error: 'botId مطلوب' });
            const botManager = activeBots.get(botId);
            if (!botManager) return res.status(404).json({ error: 'البوت غير موجود' });
            botManager.stop();
            res.json({ success: true, botId, message: 'جاري إيقاف البوت...' });
        });

        app.get('/api/bot/status/:botId', (req, res) => {
            const { botId } = req.params;
            const botManager = activeBots.get(botId);
            if (!botManager) return res.status(404).json({ error: 'البوت غير موجود' });
            res.json(botManager.getStatus());
        });

        app.get('/api/bots', (req, res) => {
            const bots = [];
            const dirs = fs.readdirSync(BOTS_DIR);
            dirs.forEach(dir => {
                const botDir = path.join(BOTS_DIR, dir);
                if (fs.statSync(botDir).isDirectory()) {
                    const files = fs.readdirSync(botDir).filter(f => f !== 'session');
                    const isRunning = activeBots.has(dir) && activeBots.get(dir).isRunning;
                    bots.push({ id: dir, name: dir, files, status: isRunning ? 'online' : 'offline' });
                }
            });
            res.json(bots);
        });

        // WebSocket
        io.on('connection', (socket) => {
            console.log('🟢 عميل متصل:', socket.id);
            socket.on('register-bot', (botId) => {
                const botManager = activeBots.get(botId);
                if (botManager) {
                    botManager.socketId = socket.id;
                    botManager.logs.forEach(log => socket.emit('bot-log', log));
                }
            });
            socket.on('disconnect', () => console.log('🔴 عميل غير متصل:', socket.id));
        });

        const PORT = 3000;
        server.listen(PORT, () => {
            console.log(`🚀 الخادم على http://localhost:${PORT}`);
            console.log(`📁 مجلد البوتات: ${BOTS_DIR}`);
            console.log('✅ المنصة جاهزة!');
        });
    </script>
</body>
</html>
